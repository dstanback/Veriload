name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test

jobs:
  # ── Unit & integration tests ────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: veriload
          POSTGRES_PASSWORD: veriload
          POSTGRES_DB: veriload_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U veriload"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://veriload:veriload@localhost:5432/veriload_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma db push --skip-generate
      - run: npm run build
      - run: npm run test

  # ── Playwright E2E tests ────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    needs: test
    # Skip on Dependabot PRs (no access to secrets)
    if: github.actor != 'dependabot[bot]'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: veriload
          POSTGRES_PASSWORD: veriload
          POSTGRES_DB: veriload_e2e
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U veriload"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://veriload:veriload@localhost:5432/veriload_e2e
      DEV_USER_EMAIL: ops@acmefreight.com
      DEV_ORG_SLUG: acme
      DEV_ORG_NAME: Acme Logistics
      DEV_USER_NAME: Maya Patel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx prisma db push --skip-generate
      - run: npm run seed

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
