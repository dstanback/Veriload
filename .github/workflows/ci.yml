name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type Check, Test, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: veriload
          POSTGRES_PASSWORD: veriload
          POSTGRES_DB: veriload_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U veriload"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://veriload:veriload@localhost:5432/veriload_test
      NODE_ENV: test
      SESSION_SECRET: ci-test-secret-not-for-production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test database
        run: npx prisma db push --skip-generate

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
